blueprint:
  name: 🔌 Smart Climate with Occupancy Control V1.2
  description: Turns on a climate appliance switch (heater, cooler, fan) when a room is occupied, checking customizable multi-user presence rules. Features an optional wattage-based fail-safe loop and a presence-based auto-off safety timeout with a manual override toggle.
  domain: automation
  input:
    climate_switch:
      name: Climate Appliance Switch
      description: The smart plug or switch connected to the heater, air conditioner, or fan.
      selector:
        entity:
          filter:
            - domain: switch
    presence_sensor:
      name: Room Presence Sensor
      description: Motion, presence, or occupancy sensor for the specific room.
      selector:
        entity:
          filter:
            - domain: binary_sensor
              device_class: occupancy
    assigned_user:
      name: Assigned Users
      description: The person or people tied to this climate zone.
      selector:
        entity:
          filter:
            - domain: person
          multiple: true
    user_presence_mode:
      name: User Presence Match Rule
      description: "Any: Runs if at least one selected user is home. All: Requires every selected user to be home."
      default: "any"
      selector:
        select:
          options:
            - label: Any user is home
              value: "any"
            - label: All users are home
              value: "all"
    vacancy_timeout:
      name: Vacancy Timeout (Auto-Off Delay)
      description: How long the appliance is allowed to run in an empty room before the automation forces a safety shutdown.
      default:
        minutes: 20
      selector:
        duration:
    override_switch:
      name: Override Safety Timeout Helper (Optional)
      description: An optional input_boolean/toggle helper entity. When turned ON, it stops the vacancy auto-off countdown completely.
      default: []
      selector:
        entity:
          filter:
            - domain: input_boolean
            - domain: switch
    power_sensor:
      name: Power Sensor (Optional)
      description: The power entity of your smart plug (measuring Watts) used to run the fail-safe logic. Leave empty if your plug doesn't monitor power.
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power
    power_threshold:
      name: Power Threshold (Watts)
      description: Minimum wattage draw needed to confirm the climate appliance is actively running.
      default: 10
      selector:
        number:
          min: 0
          max: 4000
          step: 1
          unit_of_measurement: W
          mode: box
    notification_service:
      name: Notification Service
      description: The notification service for the user's device (e.g., notify.mobile_app_your_phone).
      default: notify.notify
      selector:
        text:

# Top-level variables required to securely feed inputs into Jinja triggers
trigger_variables:
  power_sensor_var: !input power_sensor
  climate_switch_var: !input climate_switch
  power_threshold_var: !input power_threshold
  presence_sensor_var: !input presence_sensor
  override_switch_var: !input override_switch

mode: restart

trigger:
  - trigger: state
    entity_id: !input presence_sensor
    id: presence_change
  - trigger: state
    entity_id: !input assigned_user
    id: user_change
  # Trigger loop tracking if operational power drops unexpectedly while active
  - trigger: template
    value_template: >
      {% if power_sensor_var != none and power_sensor_var != [] and power_sensor_var != '' %}
        {{ is_state(climate_switch_var, 'on') and states(power_sensor_var) | float(0) < (power_threshold_var | float(0)) }}
      {% else %}
        {{ false }}
      {% endif %}
    for:
      minutes: 2
    id: power_dropped
  # Trigger loop tracking if device runs inside an empty room past the timeout
  - trigger: template
    value_template: >
      {% set ov = override_switch_var %}
      {% set override_active = (ov != none and ov != [] and ov != '' and is_state(ov, 'on')) %}
      {{ is_state(climate_switch_var, 'on') and is_state(presence_sensor_var, 'off') and not override_active }}
    for: !input vacancy_timeout
    id: vacancy_timeout_reached

condition: []

action:
  - variables:
      appliance: !input climate_switch
      presence: !input presence_sensor
      user_list: !input assigned_user
      presence_mode: !input user_presence_mode
      power_entity: !input power_sensor
      p_threshold: !input power_threshold
      notify_service: !input notification_service
      
      # Process geolocation boundaries for listed personnel
      total_users: "{{ user_list | count }}"
      home_users: "{{ user_list | expand | selectattr('state', 'eq', 'home') | list | count }}"
      users_ok: >
        {% if presence_mode == 'any' %}
          {{ home_users | int > 0 }}
        {% else %}
          {{ home_users | int == total_users | int }}
        {% endif %}

      # Master ruleset parameters
      should_be_on: "{{ is_state(presence, 'on') and users_ok }}"

  - choose:
      # ACTION 1: Wattage load dropped unexpectedly while device switch was active
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'power_dropped' and is_state(appliance, 'on') }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input climate_switch
          - action: "{{ notify_service }}"
            data:
              title: "⚠️ Appliance Operation Failure"
              message: "The climate switch was shut off because the appliance stopped drawing power while running."

      # ACTION 2: Vacancy safety timeout reached without override protection active
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'vacancy_timeout_reached' and is_state(appliance, 'on') }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input climate_switch
          - action: "{{ notify_service }}"
            data:
              title: "🛑 Safety Auto-Off Activated"
              message: "The climate switch was turned off automatically because the room remained empty."

      # ACTION 3: Presence detected and target users are verified home
      - conditions:
          - condition: template
            value_template: "{{ should_be_on and is_state(appliance, 'off') }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input climate_switch
          
          - if:
              - condition: template
                value_template: "{{ power_entity != none and power_entity != [] and power_entity != '' }}"
            then:
              - wait_for_trigger:
                  - trigger: template
                    value_template: "{{ states(power_entity) | float(0) >= p_threshold | float }}"
                timeout:
                  minutes: 1
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ wait.trigger == none }}"
                    sequence:
                      - action: switch.turn_off
                        target:
                          entity_id: !input climate_switch
                      - action: "{{ notify_service }}"
                        data:
                          title: "🚨 Climate Fail-Safe Tripped"
                          message: "The smart plug turned on, but the appliance drew 0W. Shutting down switch to protect components."
                default:
                  - action: "{{ notify_service }}"
                    data:
                      title: "💨 Climate Appliance Activated"
                      message: "The device is verified active and running at {{ states(power_entity) }}W."
            else:
              - action: "{{ notify_service }}"
                data:
                  title: "💨 Climate Appliance Activated"
                  message: "The device has been turned on because you are in the room."

      # ACTION 4: Core master users left home entirely (Instant forced structural shutdown)
      - conditions:
          - condition: template
            value_template: "{{ not users_ok and is_state(appliance, 'on') }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input climate_switch
          - action: "{{ notify_service }}"
            data:
              title: "🛑 Climate Appliance Deactivated"
              message: "The device was turned off immediately because the assigned users left home."
