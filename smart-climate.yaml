blueprint:
  name: 🔌 Smart Climate Switch Control V1
  homeassistant:
    min_version: "2024.10.0"
  description: Turns on a climate appliance switch (heater, cooler, fan) when a room is occupied, checking customizable multi-user presence rules. Includes an optional wattage-based fail-safe loop to verify operation and prevent idle electrical hazards.  Version 1.0
  domain: automation
  input:
    climate_switch:
      name: Climate Appliance Switch
      description: The smart plug or switch connected to the heater, air conditioner, or fan.
      selector:
        entity:
          filter:
            - domain: switch
    presence_sensor:
      name: Room Presence Sensor
      description: Motion, presence, or occupancy sensor for the specific room.
      selector:
        entity:
          filter:
            - domain: binary_sensor
              device_class: occupancy
    assigned_user:
      name: Assigned Users
      description: The person or people tied to this climate zone.
      selector:
        entity:
          filter:
            - domain: person
          multiple: true
    user_presence_mode:
      name: User Presence Match Rule
      description: "Any: Runs if at least one selected user is home. All: Requires every selected user to be home."
      default: "any"
      selector:
        select:
          options:
            - label: Any user is home
              value: "any"
            - label: All users are home
              value: "all"
    power_sensor:
      name: Power Sensor (Optional)
      description: The power entity of your smart plug (measuring Watts) used to run the fail-safe logic. Leave empty if your plug doesn't monitor power.
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power
    power_threshold:
      name: Power Threshold (Watts)
      description: Minimum wattage draw needed to confirm the climate appliance is actively running.
      default: 10
      selector:
        number:
          min: 0
          max: 4000
          step: 1
          unit_of_measurement: W
          mode: box
    notification_service:
      name: Notification Service
      description: The notification service for the user's device (e.g., notify.mobile_app_your_phone).
      default: notify.notify
      selector:
        text:

mode: restart

trigger:
  - trigger: state
    entity_id: !input presence_sensor
    id: presence_change
  - trigger: state
    entity_id: !input assigned_user
    id: user_change
  # Safe fail-safe trigger tracking if operational power drops unexpectedly while active
  - trigger: template
    value_template: >
      {% set p_sensor = !input power_sensor %}
      {% set p_switch = !input climate_switch %}
      {% if p_sensor != none and p_sensor != [] and p_sensor != '' %}
        {{ is_state(p_switch, 'on') and states(p_sensor) | float(0) < (!input power_threshold | float) }}
      {% else %}
        {{ false }}
      {% endif %}
    for:
      minutes: 2
    id: power_dropped

condition: []

action:
  - variables:
      appliance: !input climate_switch
      presence: !input presence_sensor
      user_list: !input assigned_user
      presence_mode: !input user_presence_mode
      power_entity: !input power_sensor
      p_threshold: !input power_threshold
      notify_service: !input notification_service
      
      # Determine if user presence matches configured rule
      total_users: "{{ user_list | count }}"
      home_users: "{{ user_list | expand | selectattr('state', 'eq', 'home') | list | count }}"
      users_ok: >
        {% if presence_mode == 'any' %}
          {{ home_users | int > 0 }}
        {% else %}
          {{ home_users | int == total_users | int }}
        {% endif %}

      # Master operational rule
      should_be_on: "{{ is_state(presence, 'on') and users_ok }}"

  - choose:
      # CONDITION 1: Appliance unexpectedly dropped below active power load while running
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'power_dropped' and is_state(appliance, 'on') }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input climate_switch
          - action: "{{ notify_service }}"
            data:
              title: "⚠️ Appliance Operation Failure"
              message: "The climate switch was shut off because the appliance stopped drawing power while running."

      # CONDITION 2: Environment demands activation, switch is currently off
      - conditions:
          - condition: template
            value_template: "{{ should_be_on and is_state(appliance, 'off') }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input climate_switch
          
          # Branch based on whether a power monitoring entity exists
          - if:
              - condition: template
                value_template: "{{ power_entity != none and power_entity != [] and power_entity != '' }}"
            then:
              # Wait up to 1 minute for the power draw to cross the operational minimum threshold
              - wait_for_trigger:
                  - trigger: template
                    value_template: "{{ states(power_entity) | float(0) >= p_threshold | float }}"
                timeout:
                  minutes: 1
              - choose:
                  # If the timer expires without power changing, turn the smart plug off (Fail-Safe)
                  - conditions:
                      - condition: template
                        value_template: "{{ wait.trigger == none }}"
                    sequence:
                      - action: switch.turn_off
                        target:
                          entity_id: !input climate_switch
                      - action: "{{ notify_service }}"
                        data:
                          title: "🚨 Climate Fail-Safe Tripped"
                          message: "The smart plug turned on, but the appliance drawn 0W. Shutting down switch to protect components."
                default:
                  # Power verified successfully
                  - action: "{{ notify_service }}"
                    data:
                      title: "💨 Climate Appliance Activated"
                      message: "The device is verified active and running at {{ states(power_entity) }}W."
            else:
              # No power sensor attached; notify immediately
              - action: "{{ notify_service }}"
                data:
                  title: "💨 Climate Appliance Activated"
                  message: "The device has been turned on because you are in the room."

      # CONDITION 3: Room is vacant or users are away, switch is running
      - conditions:
          - condition: template
            value_template: "{{ not should_be_on and is_state(appliance, 'on') }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input climate_switch
          - action: "{{ notify_service }}"
            data:
              title: "🛑 Climate Appliance Deactivated"
              message: "The device has been turned off due to vacancy or user absence."
