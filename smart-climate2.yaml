blueprint:
  name: 🔌 Smart Climate Occupancy Safety Cutoff
  description: Monitors a manually activated climate switch (heater, cooler, fan) and automatically turns it off based on room vacancy, user absence, or an optional power-monitoring fail-safe.
  domain: automation
  input:
    climate_switch:
      name: Climate Appliance Switch
      description: The smart plug or switch connected to your climate device.
      selector:
        entity:
          filter:
            - domain: switch
    presence_sensor:
      name: Room Presence Sensor
      description: Occupancy or motion sensor for the specific room.
      selector:
        entity:
          filter:
            - domain: binary_sensor
              device_class: occupancy
    assigned_user:
      name: Assigned Users
      description: The person or people tied to this climate zone. If they leave home entirely, the running appliance shuts off instantly.
      selector:
        entity:
          filter:
            - domain: person
          multiple: true
    user_presence_mode:
      name: User Presence Match Rule
      description: "Any: Stays on if at least one selected user is home. All: Requires everyone selected to be home."
      default: "any"
      selector:
        select:
          options:
            - label: Any user is home
              value: "any"
            - label: All users are home
              value: "all"
    vacancy_timeout:
      name: Vacancy Timeout (Auto-Off Delay)
      description: How long the appliance is allowed to run in an empty room before the automation forces a safety shutdown.
      default:
        minutes: 20
      selector:
        duration:
    override_switch:
      name: Override Safety Timeout Helper (Optional)
      description: Input_boolean toggle. Turning this ON completely disables the empty room auto-off countdown.
      default: []
      selector:
        entity:
          filter:
            - domain: input_boolean
            - domain: switch
    power_sensor:
      name: Power Sensor (Optional)
      description: Wattage tracking entity used for the fail-safe operational check. Leave empty if your plug doesn't monitor power.
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power
    power_threshold:
      name: Power Threshold (Watts)
      description: Minimum running wattage to confirm the appliance is working. If the switch is turned on but stays below this for 2 minutes, it shuts down.
      default: 10
      selector:
        number:
          min: 0
          max: 4000
          step: 1
          unit_of_measurement: W
          mode: box
    notify_device:
      name: Notification Device
      description: Mobile app instance that will receive safety shutdown push alerts.
      selector:
        device:
          integration: mobile_app

# Top-level variables safely forwarding configurations directly into Jinja templates
trigger_variables:
  power_sensor_var: !input power_sensor
  climate_switch_var: !input climate_switch
  power_threshold_var: !input power_threshold
  presence_sensor_var: !input presence_sensor
  override_switch_var: !input override_switch

mode: restart

trigger:
  - trigger: state
    entity_id: !input assigned_user
    id: user_change
  # Triggers if switch is ON but power draw fails or drops out for 2 continuous minutes
  - trigger: template
    value_template: >
      {% if power_sensor_var != none and power_sensor_var != [] and power_sensor_var != '' %}
        {{ is_state(climate_switch_var, 'on') and states(power_sensor_var) | float(0) < (power_threshold_var | float(0)) }}
      {% else %}
        {{ false }}
      {% endif %}
    for:
      minutes: 2
    id: power_dropped
  # Triggers if switch is ON, room is empty, and override is off for the timeout duration
  - trigger: template
    value_template: >
      {% set ov = override_switch_var %}
      {% set override_active = (ov != none and ov != [] and ov != '' and is_state(ov, 'on')) %}
      {{ is_state(climate_switch_var, 'on') and is_state(presence_sensor_var, 'off') and not override_active }}
    for: !input vacancy_timeout
    id: vacancy_timeout_reached

condition: []

action:
  - variables:
      appliance: !input climate_switch
      user_list: !input assigned_user
      presence_mode: !input user_presence_mode
      
      # Process geolocation boundaries for listed personnel
      total_users: "{{ user_list | count }}"
      home_users: "{{ user_list | expand | selectattr('state', 'eq', 'home') | list | count }}"
      users_ok: >
        {% if presence_mode == 'any' %}
          {{ home_users | int > 0 }}
        {% else %}
          {{ home_users | int == total_users | int }}
        {% endif %}

  - choose:
      # ACTION 1: Wattage fail-safe triggered (Appliance element turned off or failed at startup)
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'power_dropped' and is_state(appliance, 'on') }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input climate_switch
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            title: "⚠️ Appliance Safety Shutdown"
            message: "The climate switch was turned off because it failed to draw sufficient power while active."
            data:
              group: smart_climate_control

      # ACTION 2: Empty room safety timeout reached
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'vacancy_timeout_reached' and is_state(appliance, 'on') }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input climate_switch
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            title: "🛑 Vacancy Auto-Off"
            message: "The climate switch was turned off automatically because the room has been empty."
            data:
              group: smart_climate_control

      # ACTION 3: Target users left home entirely while device was running
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'user_change' and not users_ok and is_state(appliance, 'on') }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input climate_switch
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            title: "🛑 Absence Auto-Off"
            message: "The climate switch was turned off because the assigned users left home."
            data:
              group: smart_climate_control
